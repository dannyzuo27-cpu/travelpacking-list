<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清空所有数据</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #f7e8c9 0%, #ffbdb9 50%, #f17172 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            color: #f17172;
            margin-bottom: 20px;
        }

        .warning {
            background: #fff3cd;
            border: 2px solid #ffbdb9;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            color: #856404;
        }

        .warning-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #f17172;
        }

        .warning-list {
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.8;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f17172, #ffbdb9);
            color: white;
        }

        .btn-safe {
            background: white;
            color: #a4ceb7;
            border: 2px solid #a4ceb7;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .data-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-item:last-child {
            border-bottom: none;
        }

        .data-label {
            color: #666;
            font-size: 14px;
        }

        .data-value {
            color: #f17172;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ 清空所有数据</h1>
        
        <div class="warning">
            <div class="warning-title">⚠️ 危险操作警告</div>
            <div class="warning-list">
                以下数据将被<strong>永久删除</strong>且<strong>无法恢复</strong>：
                <br>• 所有用户账号
                <br>• 所有旅行清单
                <br>• 所有物品数据
                <br>• 所有协作关系
                <br>• 当前登录状态
            </div>
        </div>

        <div class="data-info">
            <div class="data-item">
                <span class="data-label">用户数量</span>
                <span class="data-value" id="userCount">0</span>
            </div>
            <div class="data-item">
                <span class="data-label">清单数量</span>
                <span class="data-value" id="tripCount">0</span>
            </div>
            <div class="data-item">
                <span class="data-label">物品数量</span>
                <span class="data-value" id="itemCount">0</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-safe" onclick="goBack()">取消</button>
            <button class="btn-danger" onclick="clearAllData()">确认清空</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        // 加载当前数据统计
        window.addEventListener('DOMContentLoaded', () => {
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const trips = JSON.parse(localStorage.getItem('trips') || '[]');
            const items = JSON.parse(localStorage.getItem('items') || '[]');

            document.getElementById('userCount').textContent = Object.keys(users).length;
            document.getElementById('tripCount').textContent = trips.length;
            document.getElementById('itemCount').textContent = items.length;
        });

        function clearAllData() {
            if (!confirm('最后确认：确定要删除所有数据吗？此操作不可撤销！')) {
                return;
            }

            // 清空所有localStorage数据
            localStorage.removeItem('users');
            localStorage.removeItem('trips');
            localStorage.removeItem('items');
            localStorage.removeItem('currentUser');
            localStorage.removeItem('collaborations');

            // 显示成功消息
            const status = document.getElementById('status');
            status.className = 'status success show';
            status.textContent = '✅ 所有数据已清空！3秒后返回登录页...';

            // 更新统计
            document.getElementById('userCount').textContent = '0';
            document.getElementById('tripCount').textContent = '0';
            document.getElementById('itemCount').textContent = '0';

            // 3秒后跳转
            setTimeout(() => {
                window.location.href = 'mobile.html';
            }, 3000);
        }

        function goBack() {
            window.location.href = 'mobile.html';
        }
    </script>
</body>
</html>
