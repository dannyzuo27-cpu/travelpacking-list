<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行清单 - 智能打包助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1419 50%, #1a1f3a 100%);
            min-height: 100vh;
            padding: 40px;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            padding: 24px 32px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-buttons {
            display: flex;
            gap: 16px;
        }

        .nav-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .nav-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .nav-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        /* 主内容区 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 首页 - 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .trip-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .trip-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #00d4ff 0%, #7b2ff7 100%);
        }

        .trip-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .trip-card-title {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
        }

        .trip-card-meta {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }

        .trip-card-progress {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .progress-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 0 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff 0%, #7b2ff7 100%);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* 创建页面 */
        .create-form {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .form-title {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 32px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 12px;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .option-btn {
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .form-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .form-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        /* 详情页面 */
        .detail-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
        }

        /* 左侧分类导航 */
        .categories-sidebar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            height: fit-content;
            position: sticky;
            top: 24px;
        }

        .category-nav-item {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
        }

        .category-nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .category-nav-item.active {
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .category-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .category-nav-item.active .category-badge {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 右侧内容区 */
        .detail-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-title {
            font-size: 32px;
            font-weight: 700;
            color: white;
        }

        .detail-stats {
            display: flex;
            gap: 32px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }

        /* 物品列表 */
        .items-table {
            width: 100%;
        }

        .items-table thead {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .items-table th {
            padding: 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .items-table td {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .items-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .item-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #00d4ff;
        }

        .item-name {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .item-weight {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .item-status {
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
        }

        .item-status.packed {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .item-status.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        /* 底部进度条 */
        .bottom-stats {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 31, 58, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px 40px;
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 48px;
            justify-content: center;
        }

        .stat-progress {
            flex: 1;
            max-width: 500px;
        }

        .stat-progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        .stat-progress-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .stat-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff 0%, #7b2ff7 100%);
            transition: width 0.4s ease;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="logo">🧳 旅行清单</div>
            <div class="nav-buttons">
                <button class="nav-btn secondary" onclick="showPage('home')">我的清单</button>
                <button class="nav-btn" onclick="showPage('create')">＋ 创建新清单</button>
            </div>
        </div>

        <!-- 首页 -->
        <div class="page active" id="home">
            <div class="cards-grid">
                <div class="trip-card" onclick="showPage('detail')">
                    <div class="trip-card-title">西藏6日游</div>
                    <div class="trip-card-meta">2026年5月1日 - 5月6日 · 自驾游</div>
                    <div class="trip-card-progress">
                        <div class="progress-item">
                            <span>打包进度</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 46%"></div>
                            </div>
                            <span>23/50</span>
                        </div>
                        <div class="progress-item">
                            <span>行李重量</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 37%"></div>
                            </div>
                            <span>8.5/23kg</span>
                        </div>
                    </div>
                </div>

                <div class="trip-card">
                    <div class="trip-card-title">日本7日游</div>
                    <div class="trip-card-meta">2026年6月15日 - 6月21日 · 廉航</div>
                    <div class="trip-card-progress">
                        <div class="progress-item">
                            <span>打包进度</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 80%"></div>
                            </div>
                            <span>40/50</span>
                        </div>
                        <div class="progress-item">
                            <span>行李重量</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 85%"></div>
                            </div>
                            <span>5.9/7kg</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 创建页面 -->
        <div class="page" id="create">
            <div class="create-form">
                <div class="form-title">创建新的旅行清单</div>
                
                <div class="form-group">
                    <label class="form-label">目的地</label>
                    <input type="text" class="form-input" placeholder="输入你的旅行目的地">
                </div>

                <div class="form-group">
                    <label class="form-label">出行天数</label>
                    <div class="form-options">
                        <button class="option-btn">1-3天</button>
                        <button class="option-btn">4-7天</button>
                        <button class="option-btn">8-15天</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">旅行类型</label>
                    <div class="form-options">
                        <button class="option-btn">度假休闲</button>
                        <button class="option-btn">自驾游</button>
                        <button class="option-btn">徒步</button>
                        <button class="option-btn">滑雪</button>
                        <button class="option-btn">露营</button>
                        <button class="option-btn">商务出差</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">行李限制</label>
                    <div class="form-options">
                        <button class="option-btn">廉航 (7kg)</button>
                        <button class="option-btn">经济舱 (23kg)</button>
                        <button class="option-btn">无限制</button>
                    </div>
                </div>

                <button class="form-submit">生成清单</button>
            </div>
        </div>

        <!-- 详情页面 -->
        <div class="page" id="detail">
            <div class="detail-container">
                <!-- 左侧分类 -->
                <div class="categories-sidebar">
                    <div class="category-nav-item active">
                        <span>📄 证件类</span>
                        <span class="category-badge">2/3</span>
                    </div>
                    <div class="category-nav-item">
                        <span>👕 衣物类</span>
                        <span class="category-badge">1/12</span>
                    </div>
                    <div class="category-nav-item">
                        <span>📱 电子产品</span>
                        <span class="category-badge">0/8</span>
                    </div>
                    <div class="category-nav-item">
                        <span>💊 药品类</span>
                        <span class="category-badge">0/5</span>
                    </div>
                    <div class="category-nav-item">
                        <span>🧴 洗漱用品</span>
                        <span class="category-badge">3/8</span>
                    </div>
                </div>

                <!-- 右侧内容 -->
                <div class="detail-content">
                    <div class="detail-header">
                        <div class="detail-title">证件类</div>
                        <div class="detail-stats">
                            <div class="stat-item">
                                <div class="stat-value">2/3</div>
                                <div class="stat-label">已准备</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">0.2kg</div>
                                <div class="stat-label">重量</div>
                            </div>
                        </div>
                    </div>

                    <table class="items-table">
                        <thead>
                            <tr>
                                <th style="width: 60px;"></th>
                                <th>物品名称</th>
                                <th>重量</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><input type="checkbox" class="item-checkbox" checked></td>
                                <td><div class="item-name">身份证</div></td>
                                <td><div class="item-weight">50g</div></td>
                                <td><span class="item-status packed">已打包</span></td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="item-checkbox" checked></td>
                                <td><div class="item-name">护照</div></td>
                                <td><div class="item-weight">100g</div></td>
                                <td><span class="item-status packed">已打包</span></td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="item-checkbox"></td>
                                <td><div class="item-name">边防证</div></td>
                                <td><div class="item-weight">50g</div></td>
                                <td><span class="item-status pending">待打包</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部统计 -->
    <div class="bottom-stats">
        <div class="stat-progress">
            <div class="stat-progress-label">
                <span>打包进度</span>
                <span>23 / 50 件</span>
            </div>
            <div class="stat-progress-bar">
                <div class="stat-progress-fill" style="width: 46%"></div>
            </div>
        </div>
        <div class="stat-progress">
            <div class="stat-progress-label">
                <span>行李重量</span>
                <span>8.5 / 23 kg</span>
            </div>
            <div class="stat-progress-bar">
                <div class="stat-progress-fill" style="width: 37%"></div>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 选项按钮
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // 分类导航
        document.querySelectorAll('.category-nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.category-nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
