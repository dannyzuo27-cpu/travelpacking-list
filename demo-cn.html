<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行清单 - 智能打包助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .page {
            display: none;
            height: calc(100% - 44px);
            overflow-y: auto;
        }

        .page.active {
            display: block;
        }

        /* 首页 */
        .home-page {
            padding: 40px 20px;
        }

        .home-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .home-title h1 {
            font-size: 36px;
            color: white;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .home-title p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .glass-card:hover {
            transform: translateY(-4px);
        }

        .card-title {
            font-size: 24px;
            color: #1A1A1A;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .card-meta {
            font-size: 15px;
            color: #666;
            margin-bottom: 16px;
        }

        .card-stats {
            font-size: 15px;
            color: #666;
            font-weight: 600;
        }

        .new-list-btn {
            display: block;
            margin: 0 auto;
            padding: 16px 40px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border: 2px solid white;
            border-radius: 16px;
            color: #1A1A1A;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .new-list-btn:hover {
            transform: translateY(-2px);
        }

        /* 创建页面 */
        .create-page {
            padding: 40px 20px;
        }

        .create-header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            color: white;
        }

        .back-btn {
            font-size: 28px;
            cursor: pointer;
            margin-right: 16px;
        }

        .create-title {
            font-size: 24px;
            font-weight: 700;
        }

        .step-indicator {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .question-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #1A1A1A;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            padding: 16px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            background: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn.selected {
            border-color: #a8edea;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: white;
        }

        .next-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 详情页 */
        .detail-page {
            position: relative;
            height: 100%;
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            color: white;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
        }

        .detail-content {
            height: calc(100% - 180px);
            overflow: hidden;
            position: relative;
        }

        .category-card {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 40px 20px;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .category-card.prev {
            transform: translateX(-100%);
            opacity: 0;
        }

        .category-card.active {
            transform: translateX(0);
            opacity: 1;
        }

        .category-card.next {
            transform: translateX(100%);
            opacity: 0;
        }

        .category-documents {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .category-clothing {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        .category-electronics {
            background: linear-gradient(135deg, #fdcbf1 0%, #e6dee9 100%);
        }

        .category-title {
            font-size: 32px;
            color: white;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .category-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 36px;
            font-weight: 600;
        }

        .items-list {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
        }

        .item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 2px solid rgba(0, 0, 0, 0.06);
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-checkbox {
            width: 28px;
            height: 28px;
            border: 3px solid #1A1A1A;
            border-radius: 50%;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .item-checkbox.checked {
            background: #10B981;
            border-color: #10B981;
        }

        .item-checkbox.checked::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }

        .item-name {
            flex: 1;
            font-size: 17px;
            color: #1A1A1A;
            font-weight: 600;
        }

        .category-indicators {
            text-align: center;
            margin-top: 36px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .indicator-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
        }

        .indicator-dot.active {
            background: white;
            width: 32px;
        }

        .nav-arrows {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            pointer-events: none;
        }

        .nav-arrow {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            font-size: 24px;
            color: #1A1A1A;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .nav-arrow.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .bottom-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            padding: 24px 20px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.08);
        }

        .progress-bar {
            margin-bottom: 16px;
        }

        .progress-bar:last-child {
            margin-bottom: 0;
        }

        .progress-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
        }

        .progress-track {
            height: 8px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .progress-fill.weight {
            background: linear-gradient(90deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, #ffeaa7 0%, #fdcb6e 100%);
        }

        .progress-fill.danger {
            background: linear-gradient(90deg, #ff7675 0%, #fd79a8 100%);
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>14:47</span>
            <span>📶 🔋</span>
        </div>

        <!-- 首页 -->
        <div class="page active" id="home">
            <div class="home-page">
                <div class="home-title">
                    <h1>旅行清单</h1>
                    <p>智能打包，轻松出行 ✈️</p>
                </div>

                <div class="card-list" id="cardList">
                    <!-- 示例清单 -->
                    <div class="glass-card" onclick="goToDetail('西藏6日游')">
                        <div class="card-title">西藏6日游</div>
                        <div class="card-meta">5月1日 - 5月6日 · 自驾</div>
                        <div class="card-stats">23 / 50 已打包 · 8.5 / 23 kg</div>
                    </div>
                </div>

                <button class="new-list-btn" onclick="goToCreate()">＋ 创建新清单</button>
            </div>
        </div>

        <!-- 创建页面 -->
        <div class="page" id="create">
            <div class="create-page">
                <div class="create-header">
                    <span class="back-btn" onclick="goToHome()">←</span>
                    <span class="create-title">创建清单</span>
                </div>

                <div class="step-indicator" id="stepIndicator">第 1 / 5 步</div>

                <div id="createContent">
                    <!-- 动态内容 -->
                </div>
            </div>
        </div>

        <!-- 详情页 -->
        <div class="page" id="detail">
            <div class="detail-page">
                <div class="detail-header">
                    <span class="back-btn" onclick="goToHome()">←</span>
                    <span class="header-title" id="detailTitle">西藏6日游</span>
                    <span class="menu-btn">⋮</span>
                </div>

                <div class="detail-content">
                    <div class="nav-arrows">
                        <div class="nav-arrow" id="prevBtn" onclick="prevCategory()">←</div>
                        <div class="nav-arrow" id="nextBtn" onclick="nextCategory()">→</div>
                    </div>

                    <!-- 证件类 -->
                    <div class="category-card active category-documents" data-index="0">
                        <div class="category-title">证件类</div>
                        <div class="category-subtitle"><span id="doc-progress">2 / 3</span> 已准备</div>
                        <div class="items-list" id="doc-items">
                            <div class="item">
                                <div class="item-checkbox checked" onclick="toggleCheck(this, 'doc')"></div>
                                <span class="item-name">身份证</span>
                            </div>
                            <div class="item">
                                <div class="item-checkbox checked" onclick="toggleCheck(this, 'doc')"></div>
                                <span class="item-name">护照</span>
                            </div>
                            <div class="item">
                                <div class="item-checkbox" onclick="toggleCheck(this, 'doc')"></div>
                                <span class="item-name">边防证</span>
                            </div>
                        </div>
                        <div class="category-indicators">
                            <span class="indicator-dot active"></span>
                            <span class="indicator-dot"></span>
                            <span class="indicator-dot"></span>
                        </div>
                    </div>

                    <!-- 衣物类 -->
                    <div class="category-card next category-clothing" data-index="1">
                        <div class="category-title">衣物类</div>
                        <div class="category-subtitle"><span id="cloth-progress">1 / 12</span> 已准备</div>
                        <div class="items-list" id="cloth-items">
                            <div class="item">
                                <div class="item-checkbox checked" onclick="toggleCheck(this, 'cloth')"></div>
                                <span class="item-name">冲锋衣</span>
                            </div>
                            <div class="item">
                                <div class="item-checkbox" onclick="toggleCheck(this, 'cloth')"></div>
                                <span class="item-name">保暖内衣</span>
                            </div>
                            <div class="item">
                                <div class="item-checkbox" onclick="toggleCheck(this, 'cloth')"></div>
                                <span class="item-name">羽绒服</span>
                            </div>
                            <div class="item">
                                <div class="item-checkbox" onclick="toggleCheck(this, 'cloth')"></div>
                                <span class="item-name">长袖T恤</span>
                            </div>
                        </div>
                        <div class="category-indicators">
                            <span class="indicator-dot"></span>
                            <span class="indicator-dot active"></span>
                            <span class="indicator-dot"></span>
                        </div>
                    </div>

                    <!-- 电子类 -->
                    <div class="category-card next category-electronics" data-index="2">
                        <div class="category-title">电子产品类</div>
                        <div class="category-subtitle"><span id="elec-progress">0 / 8</span> 已准备</div>
                        <div class="items-list" id="elec-items">
                            <div class="item">
                                <div class="item-checkbox" onclick="toggleCheck(this, 'elec')"></div>
                                <span class="item-name">手机</span>
                            </div>
                            <div class="item">
                                <div class="item-checkbox" onclick="toggleCheck(this, 'elec')"></div>
                                <span class="item-name">充电器</span>
                            </div>
                            <div class="item">
                                <div class="item-checkbox" onclick="toggleCheck(this, 'elec')"></div>
                                <span class="item-name">充电宝</span>
                            </div>
                        </div>
                        <div class="category-indicators">
                            <span class="indicator-dot"></span>
                            <span class="indicator-dot"></span>
                            <span class="indicator-dot active"></span>
                        </div>
                    </div>
                </div>

                <div class="bottom-progress">
                    <div class="progress-bar">
                        <div class="progress-label">
                            <span>打包进度</span>
                            <span id="packProgress">23 / 50</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="packBar" style="width: 46%"></div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-label">
                            <span>行李重量</span>
                            <span id="weightProgress">8.5 / 23 kg</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill weight" id="weightBar" style="width: 37%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let currentCategory = 0;
        const totalCategories = 3;
        let createStep = 1;
        let newListData = {
            destination: '',
            days: '',
            month: '',
            type: '',
            luggage: ''
        };

        // 统计数据
        let categoryStats = {
            doc: { checked: 2, total: 3 },
            cloth: { checked: 1, total: 12 },
            elec: { checked: 0, total: 8 }
        };
        let totalChecked = 23;
        let totalItems = 50;
        let currentWeight = 8.5;
        let maxWeight = 23;

        // 页面导航
        function goToHome() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('home').classList.add('active');
        }

        function goToCreate() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('create').classList.add('active');
            createStep = 1;
            renderCreateStep();
        }

        function goToDetail(title) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('detail').classList.add('active');
            document.getElementById('detailTitle').textContent = title;
            currentCategory = 0;
            updateCategoryView();
        }

        // 创建流程
        const createSteps = [
            {
                title: '你要去哪里?',
                type: 'input',
                field: 'destination',
                placeholder: '输入目的地城市或国家'
            },
            {
                title: '去几天?',
                type: 'options',
                field: 'days',
                options: ['1-3天', '4-7天', '8-15天', '15天以上']
            },
            {
                title: '什么时候出发?',
                type: 'options',
                field: 'month',
                options: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
            },
            {
                title: '什么类型的旅行?',
                type: 'options',
                field: 'type',
                options: ['度假休闲', '自驾游', '徒步', '滑雪', '露营', '商务出差']
            },
            {
                title: '行李类型?',
                type: 'options',
                field: 'luggage',
                options: ['廉航(7kg)', '经济舱(23kg)', '头等舱(32kg)', '无限制']
            }
        ];

        function renderCreateStep() {
            const step = createSteps[createStep - 1];
            document.getElementById('stepIndicator').textContent = `第 ${createStep} / 5 步`;
            
            let html = `<div class="question-card">
                <div class="question-title">${step.title}</div>`;
            
            if (step.type === 'input') {
                html += `<input type="text" class="input-field" id="stepInput" placeholder="${step.placeholder}">`;
            } else {
                html += `<div class="options-grid">`;
                step.options.forEach(opt => {
                    html += `<button class="option-btn" onclick="selectOption('${step.field}', '${opt}')">${opt}</button>`;
                });
                html += `</div>`;
            }
            
            html += `</div>
                <button class="next-btn" onclick="nextStep()" ${step.type === 'input' ? 'disabled' : ''}>
                    ${createStep === 5 ? '生成清单' : '下一步'}
                </button>`;
            
            document.getElementById('createContent').innerHTML = html;
            
            if (step.type === 'input') {
                const input = document.getElementById('stepInput');
                input.addEventListener('input', () => {
                    document.querySelector('.next-btn').disabled = !input.value.trim();
                });
            }
        }

        function selectOption(field, value) {
            newListData[field] = value;
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.textContent === value) {
                    btn.classList.add('selected');
                }
            });
        }

        function nextStep() {
            const step = createSteps[createStep - 1];
            if (step.type === 'input') {
                newListData[step.field] = document.getElementById('stepInput').value;
            }
            
            if (createStep === 5) {
                // 生成清单
                const title = `${newListData.destination}${newListData.days.replace('天', '')}旅行`;
                addNewList(title);
                goToDetail(title);
            } else {
                createStep++;
                renderCreateStep();
            }
        }

        function addNewList(title) {
            const cardList = document.getElementById('cardList');
            const newCard = document.createElement('div');
            newCard.className = 'glass-card';
            newCard.onclick = () => goToDetail(title);
            newCard.innerHTML = `
                <div class="card-title">${title}</div>
                <div class="card-meta">${newListData.month} · ${newListData.type}</div>
                <div class="card-stats">0 / 50 已打包 · 0 / ${newListData.luggage.match(/\d+/)?.[0] || 23} kg</div>
            `;
            cardList.appendChild(newCard);
        }

        // 分类导航
        function prevCategory() {
            if (currentCategory > 0) {
                currentCategory--;
                updateCategoryView();
            }
        }

        function nextCategory() {
            if (currentCategory < totalCategories - 1) {
                currentCategory++;
                updateCategoryView();
            }
        }

        function updateCategoryView() {
            const cards = document.querySelectorAll('.category-card');
            cards.forEach((card, index) => {
                card.classList.remove('prev', 'active', 'next');
                if (index < currentCategory) {
                    card.classList.add('prev');
                } else if (index === currentCategory) {
                    card.classList.add('active');
                } else {
                    card.classList.add('next');
                }
            });

            document.getElementById('prevBtn').classList.toggle('disabled', currentCategory === 0);
            document.getElementById('nextBtn').classList.toggle('disabled', currentCategory === totalCategories - 1);
        }

        // 打勾功能
        function toggleCheck(checkbox, category) {
            const wasChecked = checkbox.classList.contains('checked');
            checkbox.classList.toggle('checked');
            
            if (wasChecked) {
                categoryStats[category].checked--;
                totalChecked--;
                currentWeight -= 0.2;
            } else {
                categoryStats[category].checked++;
                totalChecked++;
                currentWeight += 0.2;
            }

            updateProgress(category);
        }

        function updateProgress(category) {
            // 更新分类进度
            const stat = categoryStats[category];
            document.getElementById(`${category}-progress`).textContent = `${stat.checked} / ${stat.total}`;

            // 更新总进度
            const packPercent = (totalChecked / totalItems) * 100;
            const weightPercent = (currentWeight / maxWeight) * 100;

            document.getElementById('packProgress').textContent = `${totalChecked} / ${totalItems}`;
            document.getElementById('weightProgress').textContent = `${currentWeight.toFixed(1)} / ${maxWeight} kg`;
            document.getElementById('packBar').style.width = packPercent + '%';
            document.getElementById('weightBar').style.width = weightPercent + '%';

            // 重量警告
            const weightBar = document.getElementById('weightBar');
            weightBar.classList.remove('warning', 'danger');
            if (weightPercent > 100) {
                weightBar.classList.add('danger');
            } else if (weightPercent > 80) {
                weightBar.classList.add('warning');
            }
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('detail').classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevCategory();
                if (e.key === 'ArrowRight') nextCategory();
            }
        });
    </script>
</body>
</html>
